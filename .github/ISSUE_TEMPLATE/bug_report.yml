name: Bug Report
description: Report a bug or unexpected behavior in KingKiosk
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us investigate.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you running KingKiosk on?
      options:
        - Android
        - iOS
        - macOS
        - Windows
        - Linux / Raspberry Pi
        - Apple TV (tvOS)
        - Web
      multiple: true
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: KingKiosk Version
      description: App version (found in Settings > About)
      placeholder: e.g. 1.2.3
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / Hardware
      description: What device are you running on?
      placeholder: e.g. Raspberry Pi 4, Samsung Galaxy Tab A8, iPad Pro 12.9

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of the app is affected?
      options:
        - MQTT / Commands
        - Intercom / WebRTC
        - Media Playback
        - WebView
        - Window / Tile Layout
        - Kiosk Mode
        - Home Assistant Integration
        - Settings / Configuration
        - Text-to-Speech
        - Object Detection / AI
        - DLNA
        - YouTube
        - Carousel / Slideshow
        - Other
      multiple: true
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: mqtt
    attributes:
      label: MQTT Details (if applicable)
      description: Include the MQTT topic, command payload, and broker type if this involves MQTT
      placeholder: |
        Broker: Mosquitto 2.x / EMQX / HiveMQ / etc.
        Topic: kingkiosk/DEVICE_ID/system/cmd
        Payload: {"command": "...", "payload": {...}}
      render: json

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs or error messages
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem (drag and drop images here)
